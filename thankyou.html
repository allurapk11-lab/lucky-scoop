<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - Scoopy Scoop</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #fcfcfc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .thankyou-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid #e1e1e1;
        }
        .success-icon {
            font-size: 60px;
            color: #4BB543;
            margin-bottom: 20px;
        }
        h1 {
            color: #111;
            font-size: 28px;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .order-details {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 30px;
            font-size: 15px;
            color: #333;
        }
        .order-details div {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .order-details div:last-child {
            margin-bottom: 0;
            font-weight: bold;
            border-top: 1px solid #e1e1e1;
            padding-top: 10px;
            color: #111;
        }
        .continue-btn {
            display: inline-block;
            padding: 14px 30px;
            background-color: #5a31f4;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            transition: background 0.2s;
        }
        .continue-btn:hover {
            background-color: #431ed4;
        }
    </style>
</head>
<body>

<div class="thankyou-box">
    <div class="success-icon">✓</div>
    <h1>Thank you for your order!</h1>
    <p>Your order has been confirmed successfully. We will deliver your parcel via Cash on Delivery within 3-5 working days.</p>
    
    <div class="order-details">
        <div><span>Order Status:</span> <span style="color: #4BB543; font-weight: 600;">Confirmed</span></div>
        <div><span>Payment Method:</span> <span>Cash on Delivery (COD)</span></div>
        <div><span>Delivery Charges:</span> <span>Rs.250</span></div>
    </div>

    <a href="small.html" class="continue-btn">Continue Shopping</a>
</div>

</body>
</html>
