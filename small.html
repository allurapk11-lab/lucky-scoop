<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Mystery Scoop</title>

    <link rel="stylesheet" href="scoop.css">
</head>

<body>

<div class="product-page">

    <div class="left">
        <img src="small scoop.webp" alt="Small Scoop">
    </div>

    <div class="right">

        <h1>Small Mystery Scoop</h1>

        <h2>Rs.650</h2>

        <label class="qty-label">Quantity</label>

        <div class="quantity">
           
            <button>-</button>
            <input type="number" value="1" min="1">
            
            <button>+</button>
        </div>

 
        <button class="cart-btn" onclick="addToCartAction()">Add to Cart</button>
        <button class="buy-btn" onclick="buyNowAction()">Buy Now</button>

        <hr>

        <div class="features">
            <div class="feature">
                🚚 <span>Cash on Delivery Available</span>
            </div>
            <div class="feature">
                🎁 <span>100% Surprise Mystery Box</span>
            </div>
            <div class="feature">
                💜 <span>Every Scoop is Unique</span>
            </div>
            <div class="feature">
                🔒 <span>Secure Checkout</span>
            </div>
        </div>

        <p>
            Discover a cute surprise packed with trendy beauty and lifestyle goodies.
            Every Small Scoop is unique and filled with fun items you'll love.
        </p>

    </div>

</div>

<script>
    
    const quantityInput = document.querySelector('.quantity input[type="number"]');
    const minusBtn = document.querySelector('.quantity button:first-of-type');
    const plusBtn = document.querySelector('.quantity button:last-of-type');

    if (quantityInput) {
        plusBtn.addEventListener('click', function(e) {
            e.preventDefault(); 
            let currentVal = parseInt(quantityInput.value) || 1;
            quantityInput.value = currentVal + 1;
        });

        minusBtn.addEventListener('click', function(e) {
            e.preventDefault();
            let currentVal = parseInt(quantityInput.value) || 1;
            if (currentVal > 1) {
                quantityInput.value = currentVal - 1;
            }
        });
    }

    
    function addToCartAction() {
        let quantity = quantityInput ? quantityInput.value : 1;
        alert("🛒 " + quantity + " x Small Mystery Scoop aapke cart mein add ho gaya hai!");
    }

   function buyNowAction() {
    let quantity = quantityInput ? quantityInput.value : 1;
    window.location.href = "checkout.html?qty=" + quantity;
}
</script>

</body>
</html>
